<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>ORDEM PARANORMAL - V8</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-conhecimento">
    <div class="sanity-warning" id="sanityBorder"></div>
    <div class="hp-warning" id="hpBorder"></div>
    <div class="symbol-bg" id="elementSymbol">✦</div>
    
    <div class="cast-overlay" id="castOverlay">
        <div class="cast-symbol" id="castSymbol">✦</div>
    </div>
    
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">ORDEM PARANORMAL</h1>
            <div class="app-subtitle">SISTEMA DE FICHAS V8</div>
        </header>
        
        <div class="char-selector" id="charSelector"></div>
        
        <div class="action-bar">
            <button class="action-btn primary" onclick="app.openDice()">🎲 Dados</button>
            <button class="action-btn secondary" onclick="app.openRitualLibrary()">📜 Rituais</button>
            <button class="action-btn accent" onclick="app.openInventory()">🎒 Inventário</button>
            <button class="action-btn" onclick="app.openNewChar()" style="border-color: var(--san); color: var(--san);">+ Novo</button>
        </div>
        
        <div class="data-actions">
            <button class="data-btn" onclick="app.exportData()">📤 Exportar</button>
            <button class="data-btn" onclick="app.importData()">📥 Importar</button>
            <button class="data-btn" onclick="app.duplicateChar()" id="dupBtn" style="display:none;">👥 Duplicar</button>
            <button class="data-btn danger" onclick="app.confirmDeleteChar()" id="delBtn" style="display:none;">🗑️ Deletar</button>
        </div>
        
        <div class="sheet-container" id="sheetContainer"></div>
    </div>
    
    <div class="modal-panel" id="newCharModal">
        <div class="modal-header">
            <span class="modal-title">◈ NOVO AGENTE ◈</span>
            <button class="modal-close" onclick="app.closeNewChar()">×</button>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" class="form-input" id="newName" placeholder="Nome do Agente">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Classe</label>
                    <select class="form-select" id="newClass">
                        <option>Combatente</option>
                        <option>Especialista</option>
                        <option selected>Ocultista</option>
                        <option>Médico</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Elemento</label>
                    <select class="form-select" id="newElement">
                        <option value="sangue">🩸 Sangue</option>
                        <option value="morte">☠️ Morte</option>
                        <option value="conhecimento" selected>📚 Conhecimento</option>
                        <option value="energia">⚡ Energia</option>
                        <option value="medo">👁️ Medo</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="app.createCharacter()">CRIAR AGENTE</button>
        </div>
    </div>

    <script src="js/rituals.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
