<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>ORDEM PARANORMAL - V8</title>
    <style>
        /* =========================================
           CSS - ESTILOS VISUAIS
        ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap');
        
        :root {
            --dark: #080808; --paper: #0f0f0f; --surface: #1a1a1a;
            --text: #f0f0f0; --text-muted: #777; --border: #333;
            --sangue: #8B0000; --sangue-light: #ff1a1a;
            --morte: #2a2a2a; --morte-light: #888;
            --conhecimento: #DAA520; --conhecimento-light: #FFD700;
            --energia: #9400D3; --energia-light: #da70d6;
            --medo: #f0f0f0; --medo-light: #fff;
            --pv: #dc143c; --pe: #4169e1; --san: #2e8b57;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; height: 100%; }
        body { font-family: 'Courier Prime', monospace; background: var(--dark); color: var(--text); min-height: 100vh; transition: all 0.5s; overflow-x: hidden; }
        
        @keyframes glitch { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body.san-low { animation: glitch 0.3s infinite; }
        body.san-critical { animation: glitch 0.1s infinite; filter: contrast(1.2) brightness(0.8); }
        
        .bg-sangue { background: radial-gradient(circle at 50% 0%, rgba(139,0,0,0.4), transparent 70%), var(--dark); }
        .bg-morte { background: radial-gradient(circle at 50% 0%, rgba(40,40,40,0.6), transparent 70%), var(--dark); }
        .bg-conhecimento { background: radial-gradient(circle at 50% 0%, rgba(218,165,32,0.3), transparent 70%), var(--dark); }
        .bg-energia { background: radial-gradient(circle at 50% 0%, rgba(148,0,211,0.4), transparent 70%), var(--dark); }
        .bg-medo { background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.2), transparent 70%), var(--dark); }
        
        .symbol-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80vh; opacity: 0.03; z-index: 0; font-family: 'Cinzel', serif; animation: rotate 60s linear infinite; pointer-events: none; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        
        .app-container { position: relative; z-index: 1; padding-bottom: calc(100px + var(--safe-bottom)); max-width: 600px; margin: 0 auto; }
        .app-header { position: sticky; top: 0; z-index: 100; background: linear-gradient(180deg, var(--dark) 0%, transparent 100%); padding: 16px; text-align: center; backdrop-filter: blur(10px); }
        .app-title { font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 4px; }
        .app-subtitle { font-size: 0.6rem; letter-spacing: 3px; opacity: 0.6; }
        
        .char-selector { display: flex; gap: 12px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
        .char-selector::-webkit-scrollbar { display: none; }
        .char-tab { flex-shrink: 0; width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: all 0.3s; overflow: hidden; }
        .char-tab.active { box-shadow: 0 0 20px currentColor; transform: scale(1.1); }
        .char-tab img { width: 100%; height: 100%; object-fit: cover; }
        .char-add { border-style: dashed; color: var(--text-muted); }
        
        .action-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 16px 16px; }
        .action-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 4px; color: var(--text); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .action-btn.primary { border-color: var(--sangue); color: var(--sangue-light); }
        .action-btn.secondary { border-color: var(--conhecimento); color: var(--conhecimento-light); }
        .action-btn.accent { border-color: var(--energia); color: var(--energia-light); }
        
        .data-actions { display: flex; gap: 8px; padding: 0 16px 16px; flex-wrap: wrap; }
        .data-btn { flex: 1; padding: 10px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.7rem; cursor: pointer; }
        
        .sheet-container { padding: 0 16px; }
        .sheet { display: none; animation: fadeIn 0.4s; }
        .sheet.active { display: block; }
        
        /* Modais */
        .modal-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; }
        .modal-panel.open { display: flex; animation: fadeIn 0.2s; }
        .modal-header { display: flex; justify-content: space-between; padding: 16px; border-bottom: 2px solid currentColor; background: var(--paper); font-family: 'Cinzel'; }
        .modal-close { width: 40px; height: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 1.5rem; cursor: pointer; }
        .modal-content { flex: 1; overflow-y: auto; padding: 16px; }
        
        /* Formulários e Inputs */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .form-input, .form-select { width: 100%; background: var(--paper); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 14px; font-family: 'Courier Prime'; }
        .btn-primary { width: 100%; padding: 16px; background: rgba(255,255,255,0.1); border: 2px solid currentColor; border-radius: 12px; color: currentColor; font-family: 'Cinzel'; cursor: pointer; margin-top: 20px; }
        
        /* Efeitos V8 (Avisos de Vida/Sanidade) */
        .sanity-warning { position: fixed; inset: 0; border: 4px solid transparent; pointer-events: none; z-index: 9999; transition: 0.3s; }
        .sanity-warning.low { border-color: rgba(220, 20, 60, 0.3); }
        .sanity-warning.critical { border-color: rgba(220, 20, 60, 0.8); animation: pulse 1s infinite; }
        
        .hp-warning { position: fixed; inset: 0; box-shadow: inset 0 0 0px rgba(220, 20, 60, 0); pointer-events: none; z-index: 9998; transition: 0.3s; }
        .hp-warning.critical { animation: heartbeatPulse 1.2s infinite; }
        @keyframes heartbeatPulse { 0%, 100% { box-shadow: inset 0 0 30px rgba(139, 0, 0, 0.4); } 50% { box-shadow: inset 0 0 100px rgba(139, 0, 0, 0.9); } }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* Componentes da Ficha */
        .identity-card { background: linear-gradient(145deg, var(--surface), var(--paper)); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; text-align: center;}
        .char-name { width: 100%; background: transparent; border: none; border-bottom: 2px solid currentColor; color: #fff; font-family: 'Cinzel', serif; font-size: 1.4rem; text-align: center; padding: 8px; margin-bottom: 12px; }
        .char-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .meta-field { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 8px; }
        .meta-input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 0.9rem; font-family: inherit; text-align: center;}
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-card { background: var(--surface); border-radius: 16px; padding: 16px; position: relative; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .stat-card.pv::before { background: var(--pv); } .stat-card.pe::before { background: var(--pe); } .stat-card.san::before { background: var(--san); }
        .stat-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-values { display: flex; align-items: baseline; justify-content: center; gap: 4px; margin-bottom: 12px; }
        .stat-current { width: 50px; background: transparent; border: none; color: #fff; font-size: 2rem; font-weight: bold; text-align: center; font-family: inherit; }
        .stat-max { width: 35px; background: transparent; border: none; color: #666; font-size: 1rem; text-align: center; font-family: inherit; }
        .stat-bar-bg { height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; margin-bottom: 12px; }
        .stat-bar { height: 100%; border-radius: 4px; transition: 0.3s; }
        .stat-controls { display: flex; justify-content: center; gap: 16px; }
        .stat-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); cursor: pointer; }

        .section { background: var(--surface); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
        .section-header { padding: 16px 20px; cursor: pointer; background: rgba(0,0,0,0.2); font-family: 'Cinzel'; display: flex; justify-content: space-between;}
        .section-body { padding: 20px; display: none; }
        .section.open .section-body { display: block; }

        .attrs-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .attr-box { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 12px 4px; text-align: center; cursor: pointer; }
        .attr-value { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.4rem; font-weight: bold; text-align: center; font-family: inherit; }

        .add-btn { width: 100%; padding: 14px; background: transparent; border: 2px dashed var(--border); border-radius: 10px; color: var(--text-muted); cursor: pointer; margin-top: 12px; }
        
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid currentColor; padding: 16px 24px; border-radius: 12px; z-index: 3000; animation: fadeIn 0.3s; }
        
        /* Overlay Ritual */
        .cast-overlay { position: fixed; inset: 0; z-index: 5000; display: none; align-items: center; justify-content: center; pointer-events: none; }
        .cast-overlay.active { display: flex; }
        .cast-symbol { font-size: 30vh; opacity: 0; animation: castAnimation 1.5s ease-out; }
        @keyframes castAnimation { 0% { opacity: 0; transform: scale(0.5) rotate(-180deg); } 30% { opacity: 1; transform: scale(1.2) rotate(0deg); } 70% { opacity: 0.8; transform: scale(1) rotate(0deg); } 100% { opacity: 0; transform: scale(2) rotate(180deg); } }
        .cast-overlay.sangue { background: radial-gradient(circle, transparent 30%, rgba(139,0,0,0.8) 100%); } .cast-overlay.sangue .cast-symbol { color: var(--sangue-light); text-shadow: 0 0 100px var(--sangue); }
    </style>
</head>
<body class="bg-conhecimento">
    <div class="sanity-warning" id="sanityBorder"></div>
    <div class="hp-warning" id="hpBorder"></div>
    <div class="symbol-bg" id="elementSymbol">✦</div>
    <div class="cast-overlay" id="castOverlay"><div class="cast-symbol" id="castSymbol">✦</div></div>
    
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">ORDEM PARANORMAL</h1>
            <div class="app-subtitle">SISTEMA DE FICHAS V8</div>
        </header>
        
        <div class="char-selector" id="charSelector"></div>
        
        <div class="action-bar">
            <button class="action-btn primary" onclick="openModal('diceModal')">🎲 Dados</button>
            <button class="action-btn secondary" onclick="openRitualLibrary()">📜 Rituais</button>
            <button class="action-btn accent" onclick="openInventory()">🎒 Inventário</button>
            <button class="action-btn" onclick="openModal('newCharModal')" style="border-color: var(--san); color: var(--san);">+ Novo</button>
        </div>
        
        <div class="data-actions">
            <button class="data-btn" onclick="exportData()">📤 Exportar</button>
            <button class="data-btn" onclick="importData()">📥 Importar</button>
            <button class="data-btn danger" onclick="deleteCharacter()" id="delBtn" style="display:none;">🗑️ Deletar</button>
        </div>
        
        <div class="sheet-container" id="sheetContainer"></div>
    </div>
    
    <div class="modal-panel" id="newCharModal">
        <div class="modal-header">
            <span class="modal-title">◈ NOVO AGENTE ◈</span>
            <button class="modal-close" onclick="closeModal('newCharModal')">×</button>
        </div>
        <div class="modal-content">
            <div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-input" id="newName"></div>
            <div class="form-group">
                <label class="form-label">Elemento</label>
                <select class="form-select" id="newElement">
                    <option value="sangue">🩸 Sangue</option><option value="morte">☠️ Morte</option>
                    <option value="conhecimento" selected>📚 Conhecimento</option><option value="energia">⚡ Energia</option>
                </select>
            </div>
            <button class="btn-primary" onclick="createCharacter()">CRIAR AGENTE</button>
        </div>
    </div>

    <div class="modal-panel" id="ritualLibraryModal">
        <div class="modal-header">
            <span class="modal-title">◈ GRIMÓRIO ◈</span>
            <button class="modal-close" onclick="closeModal('ritualLibraryModal')">×</button>
        </div>
        <div class="modal-content" id="ritualLibraryList"></div>
    </div>

    <div class="modal-panel" id="diceModal">
        <div class="modal-header">
            <span class="modal-title">◈ ROLAGEM ◈</span>
            <button class="modal-close" onclick="closeModal('diceModal')">×</button>
        </div>
        <div class="modal-content" style="text-align:center;">
            <p style="color:var(--text-muted); margin-bottom: 20px;">Escolha o dado:</p>
            <button class="btn-primary" onclick="rollDice(20)">Rolar D20</button>
            <div id="diceResult" style="font-size: 4rem; margin-top: 30px; font-weight: bold;"></div>
        </div>
    </div>

    <script>
        /* =========================================
           JAVASCRIPT - LÓGICA BLINDADA V8
        ========================================= */
        const ELEMENTS = {
            sangue: { symbol: '🩸', color: '#ff1a1a', bg: 'bg-sangue' },
            morte: { symbol: '☠️', color: '#888', bg: 'bg-morte' },
            conhecimento: { symbol: '📚', color: '#FFD700', bg: 'bg-conhecimento' },
            energia: { symbol: '⚡', color: '#da70d6', bg: 'bg-energia' }
        };

        const RITUALS_DB = [
            { name: 'Cicatrização', element: 'sangue', cost: '2 PE', desc: 'Cura 2d8+5 PV.' },
            { name: 'Decadência', element: 'morte', cost: '2 PE', desc: 'Causa 2d8 de Morte.' },
            { name: 'Eletrocussão', element: 'energia', cost: '1 PE', desc: 'Causa 3d6 de Energia.' }
        ];

        let characters = [];
        let currentId = null;

        // Inicia o App
        function init() {
            loadData();
            if(characters.length === 0) createDefaultChar();
            renderAll();
        }

        // FUNÇÃO DE SEGURANÇA: Garante que nunca quebre se não tiver char
        function getChar() {
            return characters.find(c => c.id === currentId);
        }

        function createDefaultChar() {
            const char = {
                id: Date.now(), name: 'Agente Novo', class: 'Ocultista', nex: '5', element: 'conhecimento',
                stats: { pv: { current: 20, max: 20 }, pe: { current: 10, max: 10 }, san: { current: 30, max: 30 }, def: 10, mov: '9m' },
                attributes: { for: 1, agi: 1, int: 2, pre: 2, vig: 1 },
                skills: [], rituals: [], inventory: { weapons: [], items: [] }
            };
            characters.push(char);
            currentId = char.id;
            saveData();
        }

        function createCharacter() {
            const name = document.getElementById('newName').value || 'Desconhecido';
            const elem = document.getElementById('newElement').value;
            const char = {
                id: Date.now(), name: name, class: 'Novato', nex: '5', element: elem,
                stats: { pv: { current: 20, max: 20 }, pe: { current: 10, max: 10 }, san: { current: 30, max: 30 }, def: 10, mov: '9m' },
                attributes: { for: 1, agi: 1, int: 1, pre: 1, vig: 1 },
                skills: [], rituals: [], inventory: { weapons: [], items: [] }
            };
            characters.push(char);
            currentId = char.id;
            saveData();
            closeModal('newCharModal');
            renderAll();
            showToast('Agente criado!');
        }

        function renderAll() {
            renderSelector();
            renderSheet();
            const c = getChar();
            if(c) {
                document.body.className = ELEMENTS[c.element].bg;
                document.getElementById('elementSymbol').textContent = ELEMENTS[c.element].symbol;
                document.getElementById('delBtn').style.display = 'block';
            } else {
                document.getElementById('delBtn').style.display = 'none';
            }
        }

        function renderSelector() {
            const container = document.getElementById('charSelector');
            container.innerHTML = characters.map(c => `
                <div class="char-tab ${c.id === currentId ? 'active' : ''}" onclick="switchChar(${c.id})" style="color: ${ELEMENTS[c.element].color}">
                    ${c.name.charAt(0).toUpperCase()}
                </div>
            `).join('') + '<div class="char-tab char-add" onclick="openModal(\'newCharModal\')">+</div>';
        }

        function renderSheet() {
            const c = getChar();
            const container = document.getElementById('sheetContainer');
            if(!c) { container.innerHTML = '<p style="text-align:center;color:#777;margin-top:20px;">Nenhum agente.</p>'; return; }

            const elem = ELEMENTS[c.element];
            container.innerHTML = `
                <div class="sheet active">
                    <div class="identity-card" style="border-color:${elem.color}50">
                        <input type="text" class="char-name" value="${c.name}" onchange="updateChar('name', this.value)" style="border-color:${elem.color}">
                        <div class="char-meta">
                            <div class="meta-field"><label class="form-label">Classe</label><input type="text" class="meta-input" value="${c.class}" onchange="updateChar('class', this.value)"></div>
                            <div class="meta-field"><label class="form-label">NEX (%)</label><input type="tel" class="meta-input" value="${c.nex}" onchange="updateChar('nex', this.value)"></div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        ${renderStat(c, 'pv', '❤️', 'Vida', 'var(--pv)')}
                        ${renderStat(c, 'pe', '⚡', 'PE', 'var(--pe)')}
                        ${renderStat(c, 'san', '🧠', 'San', 'var(--san)')}
                    </div>

                    <div class="section open">
                        <div class="section-header" onclick="this.parentElement.classList.toggle('open')"><span>Atributos</span></div>
                        <div class="section-body">
                            <div class="attrs-grid">
                                ${['for','agi','int','pre','vig'].map(attr => `
                                    <div class="attr-box" style="color:${elem.color}">
                                        <div style="font-size:0.6rem;color:#777;">${attr.toUpperCase()}</div>
                                        <input type="tel" class="attr-value" value="${c.attributes[attr]}" onchange="c.attributes['${attr}'] = parseInt(this.value)||0; saveData();">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            checkVitals(c);
        }

        function renderStat(c, key, icon, label, color) {
            const stat = c.stats[key];
            const pct = (stat.current / stat.max) * 100;
            return `
                <div class="stat-card ${key}">
                    <div class="stat-header"><span>${icon} ${label}</span></div>
                    <div class="stat-values">
                        <input type="tel" class="stat-current" value="${stat.current}" onchange="updateStat('${key}', 'current', this.value)">
                        <span style="color:#444">/</span>
                        <input type="tel" class="stat-max" value="${stat.max}" onchange="updateStat('${key}', 'max', this.value)">
                    </div>
                    <div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%; background:${color}"></div></div>
                    <div class="stat-controls">
                        <button class="stat-btn" onclick="adjustStat('${key}', -1)">-</button>
                        <button class="stat-btn" onclick="adjustStat('${key}', 1)">+</button>
                    </div>
                </div>
            `;
        }

        // Ações Seguras
        function switchChar(id) { currentId = id; saveData(); renderAll(); }
        function updateChar(f, v) { const c = getChar(); if(c){ c[f] = v; saveData(); renderSelector(); } }
        function updateStat(k, t, v) { const c = getChar(); if(!c) return; c.stats[k][t] = parseInt(v)||0; saveData(); renderSheet(); }
        function adjustStat(k, d) { const c = getChar(); if(!c) return; c.stats[k].current += d; saveData(); renderSheet(); }

        function deleteCharacter() {
            if(!confirm("Tem certeza que quer deletar o agente?")) return;
            characters = characters.filter(c => c.id !== currentId);
            currentId = characters.length ? characters[0].id : null;
            if(!currentId) createDefaultChar();
            saveData(); renderAll(); showToast("Deletado!");
        }

        // Modais e UI
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function rollDice(faces) {
            const res = Math.floor(Math.random() * faces) + 1;
            document.getElementById('diceResult').textContent = res;
            document.getElementById('diceResult').style.color = res === faces ? 'var(--sangue-light)' : (res === 1 ? '#666' : 'var(--text)');
        }

        function openRitualLibrary() {
            const c = getChar(); if(!c) return;
            const container = document.getElementById('ritualLibraryList');
            container.innerHTML = RITUALS_DB.map(r => `
                <div style="background:var(--surface); padding:15px; margin-bottom:10px; border-radius:10px; border-left:3px solid ${ELEMENTS[r.element].color}">
                    <strong>${r.name}</strong> (${r.cost}) <br> <span style="font-size:0.8rem;color:#aaa">${r.desc}</span>
                    <button class="add-btn" style="padding:8px; margin-top:10px;" onclick="castRitual('${r.cost}', '${r.element}')">🔮 Lançar Ritual</button>
                </div>
            `).join('');
            openModal('ritualLibraryModal');
        }

        function castRitual(costStr, element) {
            const c = getChar(); if(!c) return;
            const cost = parseInt(costStr.match(/\d+/)[0]);
            if(c.stats.pe.current < cost) { showToast("PE Insuficiente!"); return; }
            
            c.stats.pe.current -= cost; saveData(); renderSheet(); closeModal('ritualLibraryModal');
            
            // Efeito visual (V8)
            const overlay = document.getElementById('castOverlay');
            overlay.className = 'cast-overlay active ' + element;
            document.getElementById('castSymbol').textContent = ELEMENTS[element].symbol;
            setTimeout(() => overlay.classList.remove('active'), 1500);
            showToast(`Ritual Lançado! -${cost} PE`);
        }

        // V8 Efeitos Críticos Seguros
        function checkVitals(c) {
            const hpPct = (c.stats.pv.current / c.stats.pv.max) * 100;
            const hpBorder = document.getElementById('hpBorder');
            if(hpPct <= 20 && c.stats.pv.current > 0) {
                hpBorder.classList.add('critical');
                const pvInput = document.querySelector('.stat-card.pv .stat-current');
                if(pvInput) pvInput.classList.add('shake');
            } else { hpBorder.classList.remove('critical'); }

            const sanPct = (c.stats.san.current / c.stats.san.max) * 100;
            const sanBorder = document.getElementById('sanityBorder');
            if(sanPct <= 10) sanBorder.className = 'sanity-warning critical';
            else if (sanPct <= 25) sanBorder.className = 'sanity-warning low';
            else sanBorder.className = 'sanity-warning';
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
        }

        function saveData() { localStorage.setItem('v8_data', JSON.stringify(characters)); localStorage.setItem('v8_curr', currentId); }
        function loadData() {
            const d = localStorage.getItem('v8_data'); const c = localStorage.getItem('v8_curr');
            if(d) characters = JSON.parse(d); if(c) currentId = parseInt(c);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
