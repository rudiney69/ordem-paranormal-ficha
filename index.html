<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORDEM PARANORMAL V8.1 - EXPANDIDA</title>
    <style>
        /* Reutilizando a base da V8 e adicionando melhorias */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Courier+Prime&display=swap');
        
        :root {
            --dark: #050505; --surface: #121212; --border: #2a2a2a;
            --sangue: #ff1a1a; --morte: #9d9d9d; --conhecimento: #ffd700; --energia: #da70d6;
        }

        body { font-family: 'Courier Prime', monospace; background: var(--dark); color: #eee; margin: 0; padding-bottom: 80px; }
        .app-header { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .app-title { font-family: 'Cinzel'; letter-spacing: 3px; color: #fff; margin: 0; }

        /* Estilo da Ficha Profissional */
        .sheet-card { background: var(--surface); margin: 15px; border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .field-label { font-size: 0.65rem; color: #666; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .field-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; font-family: inherit; margin-bottom: 10px; }

        /* Sistema de Rituais Estilizado */
        .ritual-item { background: #1a1a1a; border-left: 4px solid var(--border); padding: 15px; margin-bottom: 10px; border-radius: 0 8px 8px 0; }
        .ritual-name { font-family: 'Cinzel'; font-size: 1.1rem; display: block; }
        .ritual-meta { font-size: 0.75rem; color: #888; margin: 5px 0; }
        .wiki-link { color: var(--conhecimento); text-decoration: none; font-size: 0.7rem; border: 1px solid var(--conhecimento); padding: 2px 6px; border-radius: 4px; margin-top: 10px; display: inline-block; }

        /* Perícias */
        .skill-list { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .skill-item { font-size: 0.8rem; background: #080808; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .skill-val { color: var(--conhecimento); font-weight: bold; }

        /* Navegação */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); z-index: 100; }
        .nav-btn { background: none; border: none; color: #666; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: #fff; font-weight: bold; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="app-header">
        <h1 class="app-title">ORDEM PARANORMAL</h1>
        <div id="charNameDisplay" style="font-size: 0.8rem; color: #888;">Nenhum Agente Selecionado</div>
    </header>

    <div id="tab-char" class="tab-content">
        <div class="sheet-card">
            <span class="field-label">Nome do Agente</span>
            <input type="text" id="c-name" class="field-input" onchange="sync()">
            
            <div class="grid-2">
                <div>
                    <span class="field-label">Origem</span>
                    <input type="text" id="c-origin" class="field-input" onchange="sync()">
                </div>
                <div>
                    <span class="field-label">Classe</span>
                    <input type="text" id="c-class" class="field-input" onchange="sync()">
                </div>
            </div>

            <div class="grid-2">
                <div>
                    <span class="field-label">Patente</span>
                    <select id="c-rank" class="field-input" onchange="sync()">
                        <option>Recruta</option><option>Operador</option><option>Agente Especial</option>
                        <option>Oficial de Operações</option><option>Agente de Elite</option>
                    </select>
                </div>
                <div>
                    <span class="field-label">NEX %</span>
                    <input type="number" id="c-nex" class="field-input" onchange="sync()">
                </div>
            </div>
        </div>

        <div class="sheet-card">
            <span class="field-label">Perícias Treinadas</span>
            <div class="skill-list" id="skillList">
                </div>
        </div>
    </div>

    <div id="tab-rituals" class="tab-content hidden">
        <div class="sheet-card">
            <h3 style="font-family:'Cinzel'; margin-bottom:15px;">Grimório de Rituais</h3>
            <div id="ritualsContainer">
                </div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="showTab('char')">Agente</button>
        <button class="nav-btn" onclick="showTab('rituals')">Rituais</button>
        <button class="nav-btn" onclick="exportData()">Backup</button>
    </nav>

    <script>
        // 1. DATABASE DE RITUAIS (Adicione quantos quiser aqui)
        const RITUALS_DATA = [
            { 
                name: "Cicatrização", 
                element: "sangue", 
                circle: "1º Círculo", 
                exec: "Padrão", 
                range: "Toque",
                desc: "Você acelera a cura natural do alvo. Cura 2d8+2 PV.",
                wiki: "https://ordemparanormal.fandom.com/pt-br/wiki/Cicatriza%C3%A7%C3%A3o"
            },
            { 
                name: "Decadência", 
                element: "morte", 
                circle: "1º Círculo", 
                exec: "Padrão", 
                range: "Toque",
                desc: "A fúria do tempo consome o alvo. Causa 2d8 de dano de Morte.",
                wiki: "https://ordemparanormal.fandom.com/pt-br/wiki/Decad%C3%AAncia"
            }
{ 
                name: "Transceder", 
                element: "conhecimento", 
                circle: "???", 
                exec: "Padrão", 
                range: "Toque",
                desc: "Ao entrar em comunhão com o Outro Lado e suas entidades, seu usuário é fortalecido dependendo da exposição dele ao paranormal, sendo capaz de aprender um ritual no processo.",
                wiki: ""
            }
        ];

        // 2. LISTA DE PERÍCIAS PADRÃO
        const SKILLS_LIST = ["Acrobacia", "Adestramento", "Artes", "Atletismo", "Atualidades", "Ciências", "Crime", "Diplomacia", "Enganação", "Fortitude", "Furtividade", "Iniciativa", "Intimidação", "Intuição", "Investigação", "Luta", "Medicina", "Ocultismo", "Percepção", "Pilotagem", "Pontaria", "Reflexos", "Religião", "Sobrevivência", "Tática", "Tecnologia", "Vontade"];

        let char = JSON.parse(localStorage.getItem('v81_char')) || {
            name: "Novo Agente", origin: "", class: "", rank: "Recruta", nex: 5,
            skills: {}, rituals: []
        };

        function init() {
            renderSkills();
            renderRituals();
            loadCharFields();
        }

        function renderSkills() {
            const container = document.getElementById('skillList');
            container.innerHTML = SKILLS_LIST.map(s => `
                <div class="skill-item">
                    <span>${s}</span>
                    <input type="number" value="${char.skills[s] || 0}" 
                           style="width:35px; background:none; border:none; color:var(--conhecimento); text-align:right;"
                           onchange="updateSkill('${s}', this.value)">
                </div>
            `).join('');
        }

        function renderRituals() {
            const container = document.getElementById('ritualsContainer');
            container.innerHTML = RITUALS_DATA.map(r => `
                <div class="ritual-item" style="border-left-color: var(--${r.element})">
                    <span class="ritual-name" style="color: var(--${r.element})">${r.name}</span>
                    <div class="ritual-meta">${r.circle} | Execução: ${r.exec} | Alcance: ${r.range}</div>
                    <p style="font-size:0.75rem; color:#aaa; margin: 8px 0;">${r.desc}</p>
                    <a href="${r.wiki}" target="_blank" class="wiki-link">📖 Ver na Wiki</a>
                </div>
            `).join('');
        }

        function loadCharFields() {
            document.getElementById('c-name').value = char.name;
            document.getElementById('c-origin').value = char.origin;
            document.getElementById('c-class').value = char.class;
            document.getElementById('c-rank').value = char.rank;
            document.getElementById('c-nex').value = char.nex;
            document.getElementById('charNameDisplay').textContent = char.name;
        }

        function sync() {
            char.name = document.getElementById('c-name').value;
            char.origin = document.getElementById('c-origin').value;
            char.class = document.getElementById('c-class').value;
            char.rank = document.getElementById('c-rank').value;
            char.nex = document.getElementById('c-nex').value;
            document.getElementById('charNameDisplay').textContent = char.name;
            save();
        }

        function updateSkill(name, val) {
            char.skills[name] = parseInt(val);
            save();
        }

        function save() { localStorage.setItem('v81_char', JSON.stringify(char)); }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function exportData() {
            const data = btoa(JSON.stringify(char));
            prompt("Copie seu código de backup:", data);
        }

        init();
    </script>
</body>
</html>
